version: '3.9'

services:
  web:
    build: .
    command: sh -c "sleep 7 && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  dind:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    restart: unless-stopped

  jenkins:
    image: pamblo/jenkins-with-docker:latest
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    container_name: jenkins
    environment:
      - DOCKER_HOST=tcp://dind:2375   #  Apuntamos al DinD
    depends_on:
      - dind
    restart: unless-stopped

volumes:
  jenkins_home:
  postgres_data: