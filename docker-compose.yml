version: '3.9'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  jenkins:
    image: pamblo/jenkins-with-docker:latest
    user: root  # Un poco inseguro, lo apuntamos
    ports:
      - "8080:8080"
      - "50000:50000"
    container_name: jenkins
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # MONTAR DOCKER SOCKET Y CONTROLAR SERVER
    privileged: true  # NECESARIO para poder usar Docker dentro ADMIN CONTROL
    restart: unless-stopped

volumes:
  jenkins_home: