name: React CI

on:
  push:
    branches: [ Produccion ]
  pull_request:
    branches: [ Produccion ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend/
        npm install

    - name: Run build
      run: |
        cd frontend/
        npm run build