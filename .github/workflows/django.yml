name: Django CI

on:
  push:
    branches: [ Produccion ]
  pull_request:
    branches: [ Produccion ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: helppeople
      POSTGRES_USER: pablo
      POSTGRES_PASSWORD: changeme
      DB_HOST: localhost
      DB_PORT: 5432

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: helppeople
          POSTGRES_USER: pablo
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Run tests
        run: |
          python manage.py test
